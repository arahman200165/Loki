name: Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: backend-delivery-main
  cancel-in-progress: false

jobs:
  migrate_staging:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run staging migrations
        run: npm run server:migrate

  deploy_staging:
    needs:
      - migrate_staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Trigger Render staging deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  smoke_staging:
    needs:
      - deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    env:
      SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      SMOKE_TIMEOUT_MS: 180000
      SMOKE_INTERVAL_MS: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run staging smoke check
        run: npm run smoke:backend

  approve_production:
    needs:
      - smoke_staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Await production approval
        run: echo "Production approval granted."

  release_production:
    needs:
      - approve_production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
      SMOKE_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      SMOKE_TIMEOUT_MS: 180000
      SMOKE_INTERVAL_MS: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production migrations
        run: npm run server:migrate

      - name: Trigger Render production deploy
        run: |
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Run production smoke check
        run: npm run smoke:backend

      - name: Rollback pointer
        if: failure()
        run: echo "See docs/runbooks/rollback-backend.md for rollback steps."
